<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Nouvelor</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .admin-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
    .stat-card {
      background: var(--dark2);
      border: 1px solid var(--dark4);
      border-radius: var(--radius-lg);
      padding: 24px;
    }
    .stat-num {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 600;
      color: var(--gold);
    }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 12px 16px;
      border-bottom: 1px solid var(--dark4);
    }
    .admin-table td {
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    .admin-table tr:hover td { background: rgba(255,255,255,0.02); }
    @media (max-width: 768px) { .admin-stats { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div id="navbar-container"></div>
  <div class="page">
    <div class="container section" id="admin-container">
      <div style="color:var(--muted)">Vérification des droits...</div>
    </div>
  </div>
  <div id="footer-container"></div>

  <script type="module">
    import { renderNavbar, renderFooter, formatPrice, formatDate, initAuth, showToast } from '../js/main.js'
    import { supabase } from '../js/supabase.js'

    document.getElementById('navbar-container').innerHTML = renderNavbar()
    document.getElementById('footer-container').innerHTML = renderFooter()
    const { user, profile } = await initAuth()

    if (!user || !profile?.is_admin) {
      document.getElementById('admin-container').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🚫</div>
          <div class="empty-state-title">Accès refusé</div>
          <p>Vous n'avez pas les droits administrateur.</p>
          <a href="/index.html" class="btn btn-gold">Retour à l'accueil</a>
        </div>`
      return
    }

    const [
      { count: totalListings },
      { count: totalUsers },
      { count: totalBookings },
      { count: pendingListings },
      { data: recentListings },
      { data: recentUsers }
    ] = await Promise.all([
      supabase.from('listings').select('*', { count: 'exact', head: true }),
      supabase.from('users').select('*', { count: 'exact', head: true }),
      supabase.from('bookings').select('*', { count: 'exact', head: true }),
      supabase.from('listings').select('*', { count: 'exact', head: true }).eq('statut', 'actif'),
      supabase.from('listings').select('*, categories(nom), users!owner_id(nom)').order('cree_le', { ascending: false }).limit(20),
      supabase.from('users').select('*').order('cree_le', { ascending: false }).limit(20)
    ])

    document.getElementById('admin-container').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:36px">
        <div>
          <div style="font-family:var(--font-display);font-size:40px;font-weight:300">Dashboard Admin</div>
          <div style="font-size:13px;color:var(--muted)">Bienvenue, ${profile.nom}</div>
        </div>
        <span class="badge badge-active">Administrateur</span>
      </div>

      <div class="admin-stats">
        <div class="stat-card">
          <div class="stat-num">${totalListings || 0}</div>
          <div class="stat-label">Annonces totales</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${pendingListings || 0}</div>
          <div class="stat-label">Annonces actives</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${totalUsers || 0}</div>
          <div class="stat-label">Utilisateurs</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${totalBookings || 0}</div>
          <div class="stat-label">Réservations</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('listings')">Annonces</button>
        <button class="tab-btn" onclick="switchTab('users')">Utilisateurs</button>
      </div>

      <!-- LISTINGS TAB -->
      <div id="tab-listings" class="tab-content active">
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Titre</th>
                <th>Propriétaire</th>
                <th>Catégorie</th>
                <th>Wilaya</th>
                <th>Prix/jour</th>
                <th>Statut</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${recentListings?.map(l => `
                <tr>
                  <td><a href="/pages/listing.html?id=${l.id}" style="color:var(--gold)">${l.titre.substring(0, 40)}${l.titre.length > 40 ? '...' : ''}</a></td>
                  <td>${l.users?.nom || '—'}</td>
                  <td>${l.categories?.nom || '—'}</td>
                  <td>${l.wilaya}</td>
                  <td>${formatPrice(l.prix_par_jour)}</td>
                  <td><span class="badge badge-${l.statut === 'actif' ? 'active' : 'pending'}">${l.statut}</span></td>
                  <td>${formatDate(l.cree_le)}</td>
                  <td>
                    <button class="btn btn-danger btn-sm" onclick="adminDeleteListing('${l.id}')">Suppr.</button>
                    <button class="btn btn-outline btn-sm" onclick="adminToggleListing('${l.id}','${l.statut}')">
                      ${l.statut === 'actif' ? 'Désact.' : 'Activer'}
                    </button>
                  </td>
                </tr>`).join('') || '<tr><td colspan="8" style="color:var(--muted);text-align:center;padding:32px">Aucune annonce</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>

      <!-- USERS TAB -->
      <div id="tab-users" class="tab-content">
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Nom</th>
                <th>Wilaya</th>
                <th>Téléphone</th>
                <th>Note</th>
                <th>Admin</th>
                <th>Inscrit le</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${recentUsers?.map(u => `
                <tr>
                  <td style="font-weight:500">${u.nom}</td>
                  <td>${u.wilaya || '—'}</td>
                  <td>${u.telephone || '—'}</td>
                  <td>${u.note_moyenne > 0 ? u.note_moyenne + '/5' : '—'}</td>
                  <td>${u.is_admin ? '<span class="badge badge-approved">Admin</span>' : '—'}</td>
                  <td>${formatDate(u.cree_le)}</td>
                  <td>
                    <button class="btn btn-outline btn-sm" onclick="toggleAdmin('${u.id}',${u.is_admin})">
                      ${u.is_admin ? 'Retirer admin' : 'Rendre admin'}
                    </button>
                  </td>
                </tr>`).join('') || '<tr><td colspan="7" style="color:var(--muted);text-align:center;padding:32px">Aucun utilisateur</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    `

    window.switchTab = function(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))
      const idx = ['listings', 'users'].indexOf(tab)
      document.querySelectorAll('.tab-btn')[idx]?.classList.add('active')
      document.getElementById(`tab-${tab}`)?.classList.add('active')
    }

    window.adminDeleteListing = async function(id) {
      if (!confirm('Supprimer cette annonce définitivement ?')) return
      await supabase.from('listings').delete().eq('id', id)
      showToast('Annonce supprimée.', 'success')
      location.reload()
    }

    window.adminToggleListing = async function(id, status) {
      const newStatus = status === 'actif' ? 'suspendu' : 'actif'
      await supabase.from('listings').update({ statut: newStatus }).eq('id', id)
      showToast('Statut mis à jour.', 'success')
      location.reload()
    }

    window.toggleAdmin = async function(id, isAdmin) {
      if (!confirm(isAdmin ? 'Retirer les droits admin ?' : 'Donner les droits admin ?')) return
      await supabase.from('users').update({ is_admin: !isAdmin }).eq('id', id)
      showToast('Droits mis à jour.', 'success')
      location.reload()
    }
  </script>
</body>
</html>

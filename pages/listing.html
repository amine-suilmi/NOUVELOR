<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annonce — Nouvelor</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .listing-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 40px;
      align-items: start;
    }
    .photos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 32px;
    }
    .photos-grid img {
      width: 100%; height: 220px; object-fit: cover;
    }
    .photos-grid img:first-child {
      grid-column: 1 / -1;
      height: 360px;
    }
    .photos-placeholder {
      grid-column: 1 / -1;
      height: 300px;
      background: var(--dark3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      border-radius: var(--radius-lg);
    }
    .listing-title {
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 300;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .listing-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .listing-meta span { font-size: 13px; color: var(--muted); }
    .listing-description {
      font-size: 15px;
      line-height: 1.8;
      color: var(--light2);
      margin-bottom: 32px;
    }
    /* Booking card */
    .booking-card {
      background: var(--dark2);
      border: 1px solid var(--dark4);
      border-radius: var(--radius-lg);
      padding: 28px;
      position: sticky;
      top: 84px;
    }
    .booking-price {
      font-family: var(--font-display);
      font-size: 38px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .booking-price span {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }
    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-top: 1px solid var(--dark4);
      margin-top: 8px;
      font-size: 14px;
    }
    .total-amount {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      color: var(--gold);
    }
    /* Owner card */
    .owner-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: var(--dark3);
      border-radius: var(--radius-lg);
      margin-top: 32px;
    }
    .owner-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--dark4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-family: var(--font-display);
      color: var(--gold);
      font-weight: 600;
      overflow: hidden;
      flex-shrink: 0;
    }
    .owner-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .owner-name {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 400;
    }
    .owner-stats { font-size: 12px; color: var(--muted); margin-top: 2px; }
    @media (max-width: 900px) {
      .listing-layout { grid-template-columns: 1fr; }
      .booking-card { position: static; }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>
  <div class="page">
    <div class="container section" id="listing-container">
      <div style="color:var(--muted)">Chargement...</div>
    </div>
  </div>
  <div id="footer-container"></div>

  <script type="module">
    import { renderNavbar, renderFooter, renderStars, formatPrice, formatDate, initAuth, showToast } from '../js/main.js'
    import { supabase, getCurrentUser } from '../js/supabase.js'

    document.getElementById('navbar-container').innerHTML = renderNavbar()
    document.getElementById('footer-container').innerHTML = renderFooter()
    const { user } = await initAuth()

    const params = new URLSearchParams(window.location.search)
    const listingId = params.get('id')
    if (!listingId) { window.location.href = '/pages/listings.html'; return }

    // Load listing
    const { data: listing, error } = await supabase
      .from('listings')
      .select('*, categories(nom), users!owner_id(*)')
      .eq('id', listingId)
      .single()

    if (error || !listing) {
      document.getElementById('listing-container').innerHTML = `<div class="empty-state"><div class="empty-state-title">Annonce introuvable</div></div>`
      return
    }

    // Load reviews
    const { data: reviews } = await supabase
      .from('reviews')
      .select('*, users!auteur_id(nom)')
      .eq('listing_id', listingId)
      .order('cree_le', { ascending: false })

    const owner = listing.users
    const isOwner = user && user.id === listing.owner_id

    // Photos
    const photosHtml = listing.photos && listing.photos.length > 0
      ? `<div class="photos-grid">${listing.photos.map((p, i) => `<img src="${p}" alt="Photo ${i+1}"${i > 2 ? ' style="display:none"' : ''}>`).join('')}</div>`
      : `<div class="photos-placeholder">${listing.categories ? '📦' : '📦'}</div>`

    // Reviews
    const reviewsHtml = reviews && reviews.length > 0
      ? reviews.map(r => `
          <div style="padding:20px 0;border-bottom:1px solid var(--dark4)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <span style="font-weight:500;font-size:14px">${r.users?.nom || 'Anonyme'}</span>
              <span>${renderStars(r.note)}</span>
              <span style="font-size:11px;color:var(--muted)">${formatDate(r.cree_le)}</span>
            </div>
            <p style="font-size:14px;color:var(--light2)">${r.commentaire || ''}</p>
          </div>`).join('')
      : `<p style="color:var(--muted);font-size:13px">Aucun avis pour l'instant.</p>`

    document.getElementById('listing-container').innerHTML = `
      <div style="margin-bottom:16px">
        <a href="/pages/listings.html" style="font-size:13px;color:var(--muted)">← Retour aux annonces</a>
      </div>
      <div class="listing-layout">
        <div>
          ${photosHtml}
          <div class="badge badge-active" style="margin-bottom:12px">${listing.categories?.nom || 'Autre'}</div>
          <h1 class="listing-title">${listing.titre}</h1>
          <div class="listing-meta">
            <span>📍 ${listing.ville ? listing.ville + ', ' : ''}${listing.wilaya}</span>
            <span>${renderStars(listing.note_moyenne)} ${listing.nombre_avis > 0 ? `(${listing.nombre_avis} avis)` : 'Nouveau'}</span>
            <span>Publié le ${formatDate(listing.cree_le)}</span>
          </div>
          <p class="listing-description">${listing.description || 'Aucune description fournie.'}</p>
          <hr class="divider">

          <!-- Owner -->
          <h3 style="font-family:var(--font-display);font-size:22px;font-weight:400;margin-bottom:16px">Propriétaire</h3>
          <div class="owner-card">
            <div class="owner-avatar">
              ${owner?.photo_profil ? `<img src="${owner.photo_profil}">` : (owner?.nom?.[0] || '?')}
            </div>
            <div>
              <div class="owner-name">${owner?.nom || 'Utilisateur'}</div>
              <div class="owner-stats">
                ${owner?.note_moyenne > 0 ? `${renderStars(owner.note_moyenne)} · ` : ''}
                ${owner?.wilaya || ''}
              </div>
            </div>
          </div>
          <hr class="divider">

          <!-- Reviews -->
          <h3 style="font-family:var(--font-display);font-size:22px;font-weight:400;margin-bottom:16px">
            Avis ${listing.nombre_avis > 0 ? `(${listing.nombre_avis})` : ''}
          </h3>
          ${reviewsHtml}
        </div>

        <!-- BOOKING CARD -->
        <div class="booking-card">
          <div class="booking-price">${formatPrice(listing.prix_par_jour)}<span>/jour</span></div>
          <div id="booking-alert"></div>

          ${isOwner ? `
            <div class="alert alert-info">C'est votre annonce.</div>
            <a href="/pages/profile.html" class="btn btn-outline btn-full">Gérer mes annonces</a>
          ` : `
            <div class="form-group mt-16">
              <label class="form-label">Date de début</label>
              <input type="date" class="form-input" id="date-debut" min="${new Date().toISOString().split('T')[0]}">
            </div>
            <div class="form-group">
              <label class="form-label">Date de fin</label>
              <input type="date" class="form-input" id="date-fin">
            </div>
            <div class="form-group">
              <label class="form-label">Message (optionnel)</label>
              <textarea class="form-input" id="booking-message" placeholder="Présentez-vous et précisez votre utilisation..." style="min-height:80px"></textarea>
            </div>
            <div class="total-row" id="total-row" style="display:none">
              <span>Total estimé</span>
              <span class="total-amount" id="total-amount"></span>
            </div>
            <button class="btn btn-gold btn-full mt-16" id="btn-book" onclick="submitBooking()">
              ${user ? 'Envoyer la demande' : 'Se connecter pour louer'}
            </button>
          `}
        </div>
      </div>
    `

    // Calculate total
    function calcTotal() {
      const d1 = document.getElementById('date-debut')?.value
      const d2 = document.getElementById('date-fin')?.value
      if (!d1 || !d2) return
      const days = Math.round((new Date(d2) - new Date(d1)) / 86400000)
      if (days <= 0) return
      const total = days * listing.prix_par_jour
      document.getElementById('total-row').style.display = 'flex'
      document.getElementById('total-amount').textContent = `${formatPrice(total)} (${days}j)`
    }

    document.getElementById('date-debut')?.addEventListener('change', calcTotal)
    document.getElementById('date-fin')?.addEventListener('change', calcTotal)

    window.submitBooking = async function() {
      if (!user) { window.location.href = `/pages/auth.html?redirect=${encodeURIComponent(window.location.href)}`; return }

      const dateDebut = document.getElementById('date-debut').value
      const dateFin = document.getElementById('date-fin').value
      const message = document.getElementById('booking-message').value.trim()

      if (!dateDebut || !dateFin) return showAlert('Veuillez choisir les dates.')
      if (new Date(dateFin) <= new Date(dateDebut)) return showAlert('La date de fin doit être après la date de début.')

      const days = Math.round((new Date(dateFin) - new Date(dateDebut)) / 86400000)
      const prixTotal = days * listing.prix_par_jour

      const btn = document.getElementById('btn-book')
      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span>'

      const { error } = await supabase.from('bookings').insert({
        listing_id: listingId,
        renter_id: user.id,
        date_debut: dateDebut,
        date_fin: dateFin,
        message,
        prix_total: prixTotal
      })

      if (error) {
        btn.disabled = false
        btn.textContent = 'Envoyer la demande'
        return showAlert('Erreur lors de l\'envoi. Réessayez.')
      }

      // Notify owner
      await supabase.from('notifications').insert({
        user_id: listing.owner_id,
        type: 'nouvelle_demande',
        message: `Nouvelle demande de location pour "${listing.titre}"`,
        lien: `/pages/profile.html`
      })

      btn.innerHTML = '✓ Demande envoyée !'
      btn.style.background = 'var(--success)'
      showToast('Demande envoyée avec succès !', 'success')
    }

    function showAlert(msg) {
      document.getElementById('booking-alert').innerHTML = `<div class="alert alert-error mt-16">${msg}</div>`
    }
  </script>
</body>
</html>
